<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="image/favicon.ico">
    <title>Aaron Alpha v1.0</title>
    <link rel="stylesheet" href="css/styles.css?v=3.2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Visualization Toggle Styles */
        #debug-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10000;
            display: none;
        }

        .btn-toggle.red.active {
            background-color: rgba(255, 50, 50, 0.3);
            border-color: #ff5555;
            color: #ffaaaa;
        }

        .btn-toggle.blue.active {
            background-color: rgba(50, 50, 255, 0.3);
            border-color: #5555ff;
            color: #aaaaff;
        }

        .btn-toggle.green.active {
            background-color: rgba(50, 255, 50, 0.3);
            border-color: #55ff55;
            color: #aaffaa;
        }

        .btn-toggle.yellow.active {
            background-color: rgba(255, 235, 59, 0.3);
            border-color: #ffeb3b;
            color: #fff176;
        }

        /* Custom Matte Adjustment Mode */
        #ui-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            /* Semi-transparent gray */
            z-index: 9999;
            display: none;
            cursor: not-allowed;
        }

        .drop-zone.adjust-mode {
            background-color: #0050b4 !important;
            border-color: #4da6ff !important;
            z-index: 10000;
            position: relative;
            cursor: pointer !important;
            box-shadow: 0 0 15px rgba(0, 80, 180, 0.5);
        }

        .drop-zone.adjust-mode .default-content {
            display: none;
        }

        .drop-zone.adjust-mode .adjust-message {
            display: flex !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-family: 'Inter', sans-serif;
            text-align: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let clicks pass to container */
        }

        /* Custom Dialog Styles */
        #custom-dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200000;
            display: none;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .dialog-card {
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            color: #eee;
            transition: max-width 0.3s ease;
        }

        .dialog-card.wide {
            max-width: 800px;
            width: 95%;
        }

        .dialog-card.wide .dialog-body {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Terms Links in Header */
        .header-right-links {
            display: flex;
            gap: 12px;
            margin-right: 15px;
            font-size: 10px;
            align-items: center;
        }

        .header-right-links a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .header-right-links a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .dialog-header {
            margin-bottom: 16px;
        }

        .dialog-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .dialog-body {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
            white-space: pre-wrap;
        }

        .dialog-input-container {
            margin-bottom: 24px;
        }

        .dialog-input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 10px 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .dialog-input:focus {
            border-color: #007bff;
        }

        .dialog-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .dialog-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .dialog-btn-primary {
            background: #007bff;
            color: #fff;
        }

        .dialog-btn-primary:hover {
            background: #0069d9;
        }

        .dialog-btn-secondary {
            background: #444;
            color: #eee;
        }

        .dialog-btn-secondary:hover {
            background: #555;
        }
    </style>
</head>

<body>
    <!-- Global UI Lock Overlay -->
    <div id="global-ui-lock"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:99999; background:rgba(0,0,0,0.5); cursor:wait;">
        <div
            style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:white; font-size:20px; font-weight:bold; font-family:'Inter', sans-serif;">
            処理中...
        </div>
    </div>

    <!-- No Image Guardrail Overlay (Side Panel) -->
    <div id="no-image-panel-overlay"></div>

    <!-- No Image Guardrail Overlay (Canvas/Viewport) -->
    <div id="no-image-canvas-overlay">
        <div class="no-image-message">
            <span data-i18n="alert.noImage">画像を読み込んでください。</span>
        </div>
    </div>

    <div id="ui-blocker"></div>

    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Custom Dialog -->
    <div id="custom-dialog-overlay">
        <div class="dialog-card">
            <div class="dialog-header">
                <div id="dialog-title" class="dialog-title">タイトル</div>
            </div>
            <div id="dialog-body" class="dialog-body">メッセージ</div>
            <div id="dialog-img-container" style="display: none; margin-bottom: 24px; text-align: center;">
                <img id="dialog-img" src=""
                    style="max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #444;">
            </div>
            <div id="dialog-input-container" class="dialog-input-container" style="display: none;">
                <input type="text" id="dialog-input" class="dialog-input">
            </div>
            <div class="dialog-footer">
                <button id="dialog-btn-cancel" class="dialog-btn dialog-btn-secondary"
                    data-i18n="dialog.cancel">Cancel</button>
                <button id="dialog-btn-no" class="dialog-btn dialog-btn-secondary" data-i18n="dialog.no">No</button>
                <button id="dialog-btn-ok" class="dialog-btn dialog-btn-primary" data-i18n="dialog.ok">OK</button>
                <button id="dialog-btn-yes" class="dialog-btn dialog-btn-primary" data-i18n="dialog.yes">Yes</button>
            </div>
        </div>
    </div>
    <header class="app-header" style="background:#000;">
        <div class="header-left">
            <button id="btn-settings" class="icon-btn" title="設定">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z">
                    </path>
                </svg>
            </button>
            <h1 class="app-title" style="display:inline-flex; align-items:center; margin-left:6px;">
                <a href="https://lit.link/Aaronpoint" target="_blank" rel="noopener noreferrer" style="display:flex;">
                    <img src="image/favicon.ico" alt="" style="width:24px; height:24px; margin-right:8px;">
                </a>
                Aaron Alpha <span class="version" style="margin-left:6px;">v1.0</span>
                <span id="auth-status" class="auth-status"
                    style="display: none !important;"></span>
            </h1>
        </div>
        <div class="header-right-links">
            <a id="lnk-terms" data-i18n="terms.link">利用規約</a>
        </div>
    </header>
    <!-- Settings Modal -->
    <div id="settings-modal" class="settings-modal" style="display:none;">
        <div class="settings-content">
            <div class="settings-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <h3 data-i18n="settings.title">設定</h3>
                </div>
                <button id="btn-close-settings" class="icon-btn">✕</button>
            </div>
            <div class="settings-body">
                <div
                    style="display:flex; align-items:flex-end; justify-content:space-between; gap: 20px; margin-bottom: 15px;">
                    <div class="setting-item" data-i18n-title="help.tip.settings.lang"
                        style="margin-bottom: 0; padding-bottom: 0;">
                        <label data-i18n="settings.language" style="display:block; margin-bottom: 5px;">言語</label>
                        <select id="sel-language">
                            <option value="ja">日本語</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <!-- 認証発行ボタン (未認証時に有効) -->
                    <button id="btn-issue-auth" class="setting-item" data-i18n-title="help.tip.settings.issueAuth"
                        data-i18n="settings.issueAuthBtn"
                        style="display: none !important; margin-bottom: 0; flex:1; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; font-weight: 900; font-size: 20px; padding: 12px; background: linear-gradient(135deg, #ff4c4c, #c92a2a); color: #fff; border: 2px solid #ff0000; border-radius: 6px; cursor: pointer; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); transition: all 0.2s;">認証発行</button>
                </div>
                <div class="setting-item" style="margin-top: 15px; display: none !important;" data-i18n-title="help.tip.settings.auth">
                    <label data-i18n="settings.authKey">認証キー</label>
                    <div style="display:flex; gap:5px;">
                        <input type="password" id="inp-auth-key" placeholder="Enter Key" style="flex:1;">
                        <button id="btn-save-auth-key" data-i18n="settings.save">保存</button>
                    </div>
                    <div style="margin-top: 5px; text-align: right;">
                        <button id="btn-reset-auth" class="btn-danger" style="font-size: 10px; padding: 2px 5px;"
                            data-i18n="auth.resetAuth">認証リセット</button>
                    </div>
                </div>
                <div class="setting-item"
                    style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;"
                    data-i18n-title="help.tip.settings.speed">
                    <span data-i18n="settings.speedPriority">手動位置調整速度優先（低画質）</span>
                    <label class="toggle-switch" style="margin: 0;">
                        <input type="checkbox" id="chk-speed-priority">
                        <span class="slider" style="margin: 0;"></span>
                    </label>
                </div>
                <div id="setting-item-solid-ext" class="setting-item"
                    style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;"
                    data-i18n-title="help.tip.settings.ext">
                    <span data-i18n="settings.solidExt">ソリッドモード拡張</span>
                    <label class="toggle-switch" style="margin: 0;">
                        <input type="checkbox" id="chk-solid-ext">
                        <span class="slider" style="margin: 0;"></span>
                    </label>
                </div>
                <div class="setting-item"
                    style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;"
                    data-i18n-title="help.tip.settings.auto">
                    <span data-i18n="settings.autoAlign">自動位置補正</span>
                    <label class="toggle-switch" style="margin: 0;">
                        <input type="checkbox" id="chk-auto-align" checked>
                        <span class="slider" style="margin: 0;"></span>
                    </label>
                </div>
                <div class="setting-item" style="margin-top: 15px;" data-i18n-title="help.tip.settings.undo">
                    <label data-i18n="settings.undoLimit">Undo回数上限 (3〜10)</label>
                    <input type="number" id="inp-undo-limit" min="3" max="10" value="3"
                        style="width: 100%; padding: 4px; box-sizing: border-box; margin-top: 5px;">
                </div>
                <hr style="border: none; border-top: 1px solid #444; margin: 20px 0 10px 0;">
                <div class="setting-item" style="text-align: right; border-bottom: none;"
                    data-i18n-title="help.tip.settings.reset">
                    <button id="btn-reset-settings" class="btn-danger" style="font-size: 12px; padding: 4px 10px;"
                        data-i18n="settings.resetAll">全ての設定を初期化</button>
                </div>
            </div>
        </div>
    </div>
    <div class="main-container">
        <aside class="control-panel">
            <nav class="mode-tabs"><button class="tab-btn active" data-target="panel-basic"
                    data-i18n="tab.basic">基本</button><button class="tab-btn" data-target="panel-trash"
                    data-i18n="tab.trash">ゴミ取り</button><button class="tab-btn" data-target="panel-solid"
                    data-i18n="tab.solid">不透明化</button></nav>
            <div class="controls-content">
                <div id="panel-basic" class="panel-page active">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                        <h3 data-i18n="basic.title" style="margin-bottom: 0;">基本モード</h3>
                        <button class="btn-help" data-help-target="basic">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z" />
                            </svg>
                            <span data-i18n="help.btn">使い方</span>
                        </button>
                    </div>
                    <!-- Input Images (Basic内) -->
                    <section class="input-section"
                        style="display: flex; flex-direction: column; gap: 10px; height: auto; min-height: auto;">
                        <div class="section-header" data-help-key="help.tip.basic.input"
                            style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
                            <h3 style="margin:0; white-space: nowrap; border: none; padding: 0;"
                                data-i18n="basic.inputImages">入力画像</h3><select id="sel-calc-mode"
                                data-help-key="help.tip.basic.logic"
                                style="font-size:11px; padding:2px 4px; background:#333; color:#fff; border:1px solid #555; border-radius:4px; max-width: 120px;">
                                <option value="max" data-i18n="basic.logicMax">Max法</option>
                                <option value="avg" selected data-i18n="basic.logicAvg">平均法</option>
                                <option value="lum" data-i18n="basic.logicLum">Lum法</option>
                            </select>
                        </div>
                        <div class="drop-group" style="display:flex; gap:10px; width: 100%;">
                            <div class="drop-zone" id="drop-zone-black" data-help-key="help.tip.basic.input"
                                style="flex:1; height: 110px; min-height: 110px;"><span class="label"
                                    data-i18n="basic.blackInput">黒背景</span>
                                <div class="preview-thumb"></div><input type="file" id="file-black" accept="image/*"
                                    style="display: none;">
                            </div>
                            <div class="drop-zone" id="drop-zone-white" data-help-key="help.tip.basic.input"
                                style="flex:1; height: 110px; min-height: 110px;"><span class="label"
                                    data-i18n="basic.whiteInput">白背景</span>
                                <div class="preview-thumb"></div><input type="file" id="file-white" accept="image/*"
                                    style="display: none;">
                            </div>
                        </div>
                        <!-- Auto-Offset Display -->
                        <div id="offset-display" data-help-key="help.tip.basic.correction"
                            style="font-size: 11px; color: #aaa; text-align: right; margin-top: 4px; font-family: 'Inter', sans-serif;">
                            <span id="auto-align-msg"
                                style="display: none; color: #ffcc00; margin-right: 10px;">自動位置合わせ中...</span>
                            <span data-i18n="basic.correction">補正値</span>: <span id="val-offset-x">0</span>, <span
                                id="val-offset-y">0</span>
                        </div>

                        <!-- 隠れ機能（旧ソリッドモード拡張） -->
                        <div id="curve-panel" class="control-group"
                            style="margin-top: 10px; padding: 8px; border: 1px dashed #555; border-radius: 4px; background: rgba(0,0,0,0.2); display: none;">
                            <div style="font-size: 11px; color: #ccc; margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 4px;"
                                data-i18n="basic.curveTitle">ソリッド＆半透明保護カーブ</div>
                            <label
                                style="display:flex; justify-content:space-between; font-size: 11px; margin-bottom: 4px;"
                                data-help-key="help.tip.basic.curveSolid">
                                <span data-i18n="basic.curveSolid">定着ライン (S)</span>
                                <span id="val-curve-solid" style="color: #00ffcc; font-weight: bold;">1.00</span>
                            </label>
                            <input type="range" id="rng-curve-solid" min="1" max="100" value="100"
                                style="margin-bottom: 10px;">
                            <label
                                style="display:flex; justify-content:space-between; font-size: 11px; margin-bottom: 4px;"
                                data-help-key="help.tip.basic.curvePreserve">
                                <span data-i18n="basic.curvePreserve">保護パワー (P)</span>
                                <span id="val-curve-preserve" style="color: #00ffcc; font-weight: bold;">3.0</span>
                            </label>
                            <input type="range" id="rng-curve-preserve" min="10" max="100" value="30">
                        </div>

                        <div style="margin-top: 10px;">
                            <button type="button" id="btn-reset-all" class="btn-reset-rich"
                                data-help-key="help.tip.basic.reset" style="width: 100%;" data-i18n="basic.resetAll">↺
                                リセット</button>
                        </div>
                    </section>

                    <!-- ソリッド＆半透明保護カーブ（拡張ON時のみ表示） -->
                    <div id="curve-panel" class="control-group"
                        style="margin-top: 10px; padding: 8px; border: 1px dashed #555; border-radius: 4px; background: rgba(0,0,0,0.2); display: none;">
                        <div style="font-size: 10px; color: #aaa; margin-bottom: 5px;" data-i18n="basic.curveTitle">
                            ソリッド＆半透明保護カーブ</div>
                        <label style="display:flex; justify-content:space-between; font-size: 11px;"
                            data-help-key="help.tip.basic.curveSolid">
                            <span data-i18n="basic.curveSolid">定着ライン (S)</span>
                            <span id="val-curve-solid">1.00</span>
                        </label>
                        <input type="range" id="rng-curve-solid" min="1" max="100" value="100">
                        <label style="display:flex; justify-content:space-between; font-size: 11px; margin-top: 5px;"
                            data-help-key="help.tip.basic.curvePreserve">
                            <span data-i18n="basic.curvePreserve">保護パワー (P)</span>
                            <span id="val-curve-preserve">3.0</span>
                        </label>
                        <input type="range" id="rng-curve-preserve" min="10" max="100" value="30">
                    </div>

                    <div class="export-area" style="margin-top: 20px; padding-top: 0; border-top: none;">
                        <div class="control-group common-bg-group">
                            <div class="group-header" style="border-bottom: none;">
                                <span data-i18n="bg.label">背景設定</span>
                                <!-- Comparison Toggle (Inline) -->
                                <label class="toggle-switch" title="Before/After 比較"
                                    data-help-key="help.tip.basic.compare">
                                    <input type="checkbox" class="chk-comparison-mode">
                                    <span class="slider" style="width: 24px; height: 14px; margin-right: 4px;"></span>
                                    <span class="label-text" style="font-size: 11px;"
                                        data-i18n="bg.comparison">比較</span>
                                </label>
                            </div>

                            <div class="bg-toggle-container" data-help-key="help.tip.basic.bg">
                                <!-- Compact BG Toggle (Checkbox based) -->
                                <label class="bg-toggle-switch">
                                    <input type="checkbox" id="chk-bg-basic-color">
                                    <span class="bg-toggle-label label-transparent" data-i18n="bg.checker">透明</span>
                                    <span class="bg-toggle-label label-color" data-i18n="bg.color">カラー</span>
                                </label>
                                <input type="color" class="bg-common-color-picker" value="#000000" disabled
                                    style="flex: 1; height:26px; padding:0; border:none; border-radius: 4px;">
                            </div>
                        </div>
                        <button type="button" id="btn-export-a" class="btn-primary"
                            data-help-key="help.tip.basic.export" data-i18n="basic.export">PNG出力</button>
                    </div>

                    <div style="margin-top:8px; text-align:center;">
                        <img src="image/icon.png" alt=""
                            style="width:80%; height:auto; border-radius:8px; display:inline-block;">
                    </div>
                </div>

                <div id="panel-trash" class="panel-page">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                        <h3 data-i18n="trash.title" style="margin-bottom: 0;">ゴミ取りモード</h3>
                        <button class="btn-help" data-help-target="trash">
                            <svg viewBox="0 0 24 24">
                                <path
